name: CLA Assistant

# Records contributor CLA acceptance (CLA.md) on each PR via CLA-assistant Lite.
#
# SETUP (one-time, before enabling):
#   1. Create a classic Personal Access Token with `repo` scope.
#   2. Add it as the repository secret `CLA_SIGNATURES_TOKEN`.
#   3. Confirm `path-to-document` points at this repo's CLA.md on the default branch.
# Signatures are stored in `signatures/cla.json` on the default branch.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/haraldwegner/goja-studio/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'haraldwegner,dependabot[bot]'
